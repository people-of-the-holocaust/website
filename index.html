<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POTH Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    background-color: #0f0f0f;
    color: #e5e5e5;
    line-height: 1.6;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 5%;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.brand {
    font-weight: 600;
    color: #b0b0b0;
}

.date {
    color: #888;
}

.hero {
    position: relative;
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("./images/name.jpg"); /* IMAGE LINK BASICALLY*/
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: grayscale(100%);
    z-index: 0;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(15,15,15,0.85), rgba(15,15,15,1));
    z-index: 1;
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    font-size: 4rem;
    font-weight: 300;
}

input[type="file"] {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 0.5rem;
    cursor: pointer;
}

.database-section {
    padding: 4rem 5%;
    max-width: 1200px;
    margin: auto;
}

.database-section h3 {
    margin-bottom: 2rem;
    font-weight: 500;
    border-bottom: 1px solid #333;
    padding-bottom: 0.5rem;
    color: #b5b5b5;
}

.record {
    padding: 1rem 0;
    border-bottom: 1px solid #222;
    transition: background 0.2s ease;
}

.record:hover {
    background: #1a1a1a;
}

.record-title {
    font-weight: 500;
    font-size: 1.1rem;
}

.record-meta {
    font-size: 0.85rem;
    color: #777;
}

</style>
</head>
<body>

<div class="top-bar">
    <div class="brand">MARQUETTE UNIVERSITY</div>
    <div class="brand">BADER PHILANTHROPIES / USHMM</div>
</div>

<section class="hero">
    <div class="hero-content">
        <h1>PEOPLE OF THE HOLOCAUST</h1>
    </div>
</section>

<section class="database-section">
    <h3>People & Place Records</h3>

    <div class="record">
        <div class="record-title">Example Place</div>
        <div class="record-meta">Country - State - Activities</div>
    </div>

    <div class="record">
        <div class="record-title">Example Person</div>
        <div class="record-meta">Status - Locations - Dates - Activities</div>
    </div>
</section>

</body>
</html>
