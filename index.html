<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POTH Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    background-color: #0f0f0f;
    color: #e5e5e5;
    line-height: 1.6;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 5%;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.brand {
    font-weight: 600;
    color: #b0b0b0;
}

.date {
    color: #888;
}

.hero {
    position: relative;
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("./images/name.jpg"); /* IMAGE LINK BASICALLY*/
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: grayscale(100%);
    z-index: 0;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: 
        linear-gradient(to bottom, rgba(15,15,15,0.6), rgba(15,15,15,1)),
        radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
    z-index: 1;
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    font-size: 4rem;
    font-weight: 300;
}

input[type="file"] {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 0.5rem;
    cursor: pointer;
}

.database-section {
    padding: 4rem 5%;
    max-width: 1200px;
    margin: auto;
}

.database-section h3 {
    margin-bottom: 2rem;
    font-weight: 500;
    border-bottom: 1px solid #333;
    padding-bottom: 0.5rem;
    color: #b5b5b5;
}

.database-section h3::after {
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: #444;
    margin-top: 0.5rem;
}

.record {
    padding: 1rem 0;
    border-bottom: 1px solid #222;
    transition: background 0.2s ease;
}

.record:hover {
    background: #1a1a1a;
}

.record-title {
    font-weight: 500;
    font-size: 1.15rem;
}

.record-meta em {
    display: block;
    margin-top: 0.5rem;
    color: #aaa;
    font-style: normal;
    border-left: 2px solid #333;
    padding-left: 0.75rem;
}

</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    async function initializeMap() {
    const response = await fetch('mapdata.json');
    const rawData = await response.json();

    const data = rawData["Map Data"]; 
    // Necessary to unpack data because data is an object on the outermost layer rather than an array
    // Might fix later but is functional for now

    console.log("Full data:", data);

    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    // Using OpenStreetMap now instead of Google Maps API using Leaflet
    // Consult OpenStreetMap wiki and YouTube, will collect resources later
    // https://wiki.openstreetmap.org/
    // https://leafletjs.com/

    data.forEach(item => {
        console.log(item);
        if (!item.Latitude || !item.Longitude) {
            console.log("SKIPPED:", item);
            return;
        }
        // Runs through data + checks if each individual place has a Latitude/Longitude value
        // (otherwise we can't plot it as a marker)

        const lat = parseFloat(item.Latitude);
        const lng = parseFloat(item.Longitude);

        console.log("Lat/Lng:", lat, lng);
        // All of these are displayed in the inspect console on Google Chrome, if
        // you so desire to debug that way. I found it helpful

        const marker = L.marker([lat, lng]).addTo(map);
        // Self explanatory

        marker.bindPopup(`
            <div style="color:black">
                <strong>${item.Name}</strong><br>
                ${item.Type} - ${item.Subtype}<br>
                ${item["Current Country"]}
            </div>
            `);
        });
    }
    window.onload = initializeMap;
    </script>

<script>
    async function loadPeople() {
        const response = await fetch('peopledata.json');
        const rawData = await response.json();
    
        const people = rawData["People"];
        const container = document.getElementById("people-container");
        
        // Overall pretty similar experience just working with .json information

        people.forEach(person => {
            const record = document.createElement("div");
            record.className = "record";
    
            let summary = "";
    
            for (let i = 1; i <= 5; i++) { // 5 is hard set placeholder value for now
                if (person[`Location ${i}`]) {
                    summary += `
                        ${person[`Location ${i}`].trim()}
                        (${person[`Time Period ${i}`] || "No date"})
                        <br>
                    `;
                    // Gets rid of excess spaces + adds date if there is one (otherwise no date obv)
                }
            }
            const title = document.createElement("div");
            title.className = "record-title";
            title.textContent = person.Name;
    
            const meta = document.createElement("div");
            meta.className = "record-meta";
            meta.innerHTML = summary;
    
            const extra = document.createElement("div");
            extra.className = "record-meta";
            extra.style.display = "none";
            extra.style.marginTop = "0.5rem";
            extra.innerHTML = `
                <em>${person["Personal Information"] || "No additional info"}</em>
            `;
            record.addEventListener("click", () => {
                extra.style.display = extra.style.display === "none" ? "block" : "none";
            });
            // So we see the extra information for each record on click

            record.appendChild(title);
            record.appendChild(meta);
            record.appendChild(extra);
            container.appendChild(record);
        });
    }
    loadPeople();
</script>

</head>
<body>

<div class="top-bar">
    <div class="brand">MARQUETTE UNIVERSITY</div>
    <div class="brand">BADER PHILANTHROPIES / USHMM</div>
</div>

<section class="hero">
    <div class="hero-content">
        <h1>PEOPLE OF THE HOLOCAUST</h1>
    </div>
</section>

<section class="database-section">
    <h3>Map View</h3>
    <div id="map" style="height: 500px; width: 100%;"></div>
</section>

<section class="database-section">
    <h3>People & Place Records</h3>
    <div id="people-container">


    </div>
</section>

</body>
</html>
